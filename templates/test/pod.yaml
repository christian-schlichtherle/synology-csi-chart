{{- range $name, $_ := $.Values.storageClasses }}
{{- if and .test (not .disabled) }}
{{- with $.Values.test }}
---
apiVersion: v1
kind: Pod
metadata:
  annotations:
    helm.sh/hook: test
    helm.sh/hook-weight: "1"
  labels:
    app: test
    {{- include "synology-csi.labels" $ | nindent 4 }}
  name: {{ include "synology-csi.fullname" $ }}-{{ $name }}-test
spec:
  {{- with .affinity }}
  affinity: {{- toYaml . | nindent 8 }}
  {{- end }}
  containers:
    - image: christianschlichtherle/fio
      name: test
      volumeMounts:
        - mountPath: /tmp
          name: test
  {{- with .nodeSelector }}
  nodeSelector: {{- toYaml . | nindent 8 }}
  {{- end }}
  restartPolicy: Never
  {{- with .tolerations }}
  tolerations: {{- toYaml . | nindent 8 }}
  {{- end }}
  volumes:
    - name: test
      persistentVolumeClaim:
        claimName: {{ include "synology-csi.fullname" $ }}-{{ $name }}-test
{{- end }}
{{- end }}
{{- end }}
